<!DOCTYPE html>
<html>
<head>

<title>Waste Sorting Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#0f172a);

background-size:400% 400%;

animation:bgMove 12s infinite alternate;

color:white;

}

@keyframes bgMove{

0%{background-position:0% 50%}
100%{background-position:100% 50%}

}

/* Main container */

.container{

width:900px;

padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

box-shadow:0 15px 50px rgba(0,0,0,0.7);

text-align:center;

}

/* Title */

h1{

font-size:36px;

margin-bottom:10px;

background:linear-gradient(90deg,#60a5fa,#3b82f6);

-webkit-background-clip:text;

color:transparent;

}

/* Timer */

.timer{

display:inline-block;

padding:10px 25px;

margin-top:20px;

margin-bottom:40px;

border-radius:12px;

border:2px solid #3b82f6;

font-size:20px;

box-shadow:0 0 12px #3b82f6;

}

/* Items */

.items{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:20px;

margin-bottom:50px;

}

.item{

padding:15px;

background:linear-gradient(145deg,#2563eb,#1d4ed8);

border-radius:12px;

cursor:grab;

transition:0.3s;

font-weight:600;

}

.item:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:0 10px 20px rgba(0,0,0,0.6);

}

/* Bins */

.bins{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

}

.bin{

height:130px;

border-radius:15px;

background:rgba(255,255,255,0.05);

border:2px dashed #3b82f6;

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

font-weight:bold;

transition:0.3s;

}

.bin:hover{

transform:scale(1.05);

background:rgba(59,130,246,0.1);

}

/* Popup */

.popup{

display:none;

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:#020617;

padding:40px;

border-radius:20px;

border:2px solid #3b82f6;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,0.9);

}

button{

margin-top:15px;

padding:10px 25px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

cursor:pointer;

font-size:16px;

transition:0.3s;

}

button:hover{

background:#1d4ed8;

}

.star{

font-size:28px;

color:gold;

margin-top:10px;

}

</style>

</head>

<body>

<div class="container">

<h1>Waste Sorting Game ♻</h1>

<p>Drag items into the correct recycling bins</p>

<div class="timer">
Time Left : <span id="time">60</span>s
</div>

<div class="items">

<div class="item" draggable="true" data-type="plastic">Bottle</div>
<div class="item" draggable="true" data-type="organic">Banana Peel</div>
<div class="item" draggable="true" data-type="paper">Newspaper</div>
<div class="item" draggable="true" data-type="metal">Can</div>
<div class="item" draggable="true" data-type="plastic">Plastic Bag</div>
<div class="item" draggable="true" data-type="organic">Apple Core</div>
<div class="item" draggable="true" data-type="paper">Cardboard</div>
<div class="item" draggable="true" data-type="metal">Aluminium Foil</div>

</div>

<div class="bins">

<div class="bin" data-type="plastic">Plastic</div>
<div class="bin" data-type="organic">Organic</div>
<div class="bin" data-type="paper">Paper</div>
<div class="bin" data-type="metal">Metal</div>

</div>

</div>

<!-- START POPUP -->

<div id="startPopup" class="popup">

<h2>♻ Waste Sorting Game</h2>

<p>Drag each item into the correct bin.</p>

<button onclick="startGame()">Start Game</button>

</div>

<!-- SUCCESS POPUP -->

<div id="successPopup" class="popup">

<h2>🎉 Great Job!</h2>

<p>You sorted all waste correctly!</p>

<div id="stars"></div>

<button onclick="goHome()">Back to Dashboard</button>

</div>

<script>

window.onload=function(){
document.getElementById("startPopup").style.display="block";
}

/* TIMER */

let time=60;
let timer;

function startGame(){

document.getElementById("startPopup").style.display="none";

timer=setInterval(()=>{

time--;

document.getElementById("time").innerText=time;

if(time<=0){

clearInterval(timer);

alert("Time Up!");

location.reload();

}

},1000);

}

/* GAME */

let items=document.querySelectorAll(".item");
let bins=document.querySelectorAll(".bin");

let correctCount=0;

items.forEach(item=>{

item.addEventListener("dragstart",e=>{
e.dataTransfer.setData("type",item.dataset.type);
e.dataTransfer.setData("id",item.innerText);
});

});

bins.forEach(bin=>{

bin.addEventListener("dragover",e=>e.preventDefault());

bin.addEventListener("drop",e=>{

let type=e.dataTransfer.getData("type");
let id=e.dataTransfer.getData("id");

let category=bin.dataset.type;

if(type===category){

bin.innerHTML="✔ Correct";
bin.style.background="#16a34a";

correctCount++;

document.querySelectorAll(".item").forEach(el=>{
if(el.innerText===id) el.style.display="none";
});

}else{

bin.innerHTML="✖ Wrong";
bin.style.background="#dc2626";

}

setTimeout(()=>{

bin.innerHTML=category.charAt(0).toUpperCase()+category.slice(1);
bin.style.background="rgba(255,255,255,0.05)";

},2000);

if(correctCount===8){

clearInterval(timer);
showSuccess();

}

});

});

function showSuccess(){

document.getElementById("successPopup").style.display="block";

let starHTML="";

if(time>40) starHTML="⭐⭐⭐";
else if(time>20) starHTML="⭐⭐";
else starHTML="⭐";

document.getElementById("stars").innerHTML=starHTML;

}

function goHome(){
window.location.href="/home";
}

</script>

</body>
</html>
